[build]
  # Como você usa pnpm no seu projeto, este é o comando de build
  command = "pnpm run build"
  # Diz ao Netlify que os arquivos finais do site estão em dist/public
  publish = "dist/public"

# Redireciona todas as rotas para o index.html, permitindo que o React (wouter) gerencie a navegação
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
